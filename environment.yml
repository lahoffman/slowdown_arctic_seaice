name: slowdown-seaice
channels:
  - conda-forge
  - defaults
dependencies:
  # Python (restricted by TensorFlow 2.14)
  - python=3.10

  # Core scientific stack (compatible with TensorFlow 2.14)
  - numpy=1.23.5
  - scipy
  - pandas

  # Data handling
  - xarray
  - netcdf4
  - openpyxl  # For Excel file reading/writing

  # Plotting
  - matplotlib
  - cartopy
  - cmocean

  # Machine Learning
  - tensorflow=2.14.0
  - scikit-learn

  # Development tools
  - jupyter
  - ipython

  # pip packages
  - pip
  - pip:
    - innvestigate>=2.0.1  # XAI library (requires TensorFlow 2.x)
    - -e .  # Install this package in editable mode