name: slowdown-standard
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  - xarray>=2023.0
  - netcdf4>=1.6
  - matplotlib>=3.7
  - cartopy>=0.22
  - cmocean>=3.0
  - jupyter
  - ipython
  - pip
  - pip:
    - -e .  # Install the package in editable mode
