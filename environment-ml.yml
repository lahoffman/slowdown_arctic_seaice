name: slowdown-ml
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version - TensorFlow 2.x requires Python <=3.10
  - python=3.9

  # Core scientific stack (older versions compatible with TF 2.x)
  - numpy=1.23.5
  - scipy=1.10.1
  - pandas=1.5.3

  # Data handling
  - xarray=2023.1.0
  - netcdf4=1.6.2

  # Plotting
  - matplotlib=3.7.1
  - cartopy=0.21.1
  - cmocean=3.0.3

  # Machine Learning
  - tensorflow=2.14.0  # Last version supporting Python 3.9 well
  - scikit-learn=1.2.2

  # Development tools
  - jupyter
  - ipython

  # Use pip for packages not in conda
  - pip
  - pip:
    - innvestigate>=2.0.1  # XAI library for LRP
    - -e .  # Install the package in editable mode


